# APK download headers for CloudPanel / Nginx
# Paste into: CloudPanel → Sites → sakuraschoolsimulator.net → Vhost → Custom config
# Or include from the main server block.

types {
    application/vnd.android.package-archive apk;
}

location ~* \.apk$ {
    add_header Content-Disposition 'attachment';
    add_header Cache-Control "public, max-age=86400";
}
